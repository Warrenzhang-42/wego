<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AI导游小go · WeGO</title>
  <meta name="description" content="与AI导游小go交流" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="route-detail.css" />
  <link rel="stylesheet" href="ai-chat.css" />
</head>
<body>
  <div id="app" class="ac-app-container">

    <!-- ===== MAP SECTION ===== -->
    <div class="rd-map-wrapper ac-map-wrapper" id="ac-map-wrapper">
      <button class="rd-back-btn" id="ac-back-btn" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="ac-end-btn" id="ac-end-btn" aria-label="结束">结束</button>

      <!-- Map canvas -->
      <div class="rd-map-canvas">
        <svg id="ac-map-svg" viewBox="0 0 390 280" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
          <rect width="390" height="280" fill="#EFF1F0"/>
          <g stroke="#D8DCE0" stroke-width="9" stroke-linecap="round">
            <line x1="0" y1="55" x2="390" y2="55"/>
            <line x1="0" y1="100" x2="390" y2="108"/>
            <line x1="0" y1="155" x2="390" y2="150"/>
            <line x1="0" y1="210" x2="390" y2="205"/>
            <line x1="0" y1="260" x2="390" y2="260"/>
            <line x1="60" y1="0" x2="65" y2="280"/>
            <line x1="140" y1="0" x2="145" y2="280"/>
            <line x1="220" y1="0" x2="215" y2="280"/>
            <line x1="300" y1="0" x2="298" y2="280"/>
            <line x1="360" y1="0" x2="360" y2="280"/>
          </g>
          <g stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.6">
            <line x1="0" y1="55" x2="390" y2="55"/>
            <line x1="0" y1="100" x2="390" y2="108"/>
            <line x1="0" y1="155" x2="390" y2="150"/>
            <line x1="0" y1="210" x2="390" y2="205"/>
            <line x1="0" y1="260" x2="390" y2="260"/>
            <line x1="60" y1="0" x2="65" y2="280"/>
            <line x1="140" y1="0" x2="145" y2="280"/>
            <line x1="220" y1="0" x2="215" y2="280"/>
            <line x1="300" y1="0" x2="298" y2="280"/>
            <line x1="360" y1="0" x2="360" y2="280"/>
          </g>
          <g fill="#E2E5E3" stroke="#D0D4D2" stroke-width="0.5">
            <rect x="70" y="5" width="65" height="44" rx="3"/>
            <rect x="150" y="5" width="60" height="44" rx="3"/>
            <rect x="225" y="5" width="68" height="44" rx="3"/>
            <rect x="305" y="5" width="45" height="44" rx="3"/>
            <rect x="70" y="65" width="65" height="37" rx="3"/>
            <rect x="150" y="65" width="60" height="30" rx="3"/>
            <rect x="155" y="75" width="50" height="38" rx="3"/>
            <rect x="225" y="65" width="68" height="38" rx="3"/>
            <rect x="305" y="65" width="45" height="38" rx="3"/>
            <rect x="5" y="115" width="50" height="33" rx="3"/>
            <rect x="70" y="115" width="65" height="33" rx="3"/>
            <rect x="150" y="115" width="60" height="28" rx="3"/>
            <rect x="225" y="118" width="68" height="25" rx="3"/>
            <rect x="305" y="115" width="45" height="33" rx="3"/>
            <rect x="5" y="160" width="50" height="43" rx="3"/>
            <rect x="70" y="160" width="65" height="43" rx="3"/>
            <rect x="150" y="160" width="60" height="43" rx="3"/>
            <rect x="225" y="160" width="68" height="43" rx="3"/>
            <rect x="305" y="160" width="45" height="43" rx="3"/>
            <rect x="5" y="215" width="50" height="40" rx="3"/>
            <rect x="70" y="215" width="65" height="40" rx="3"/>
            <rect x="150" y="215" width="60" height="40" rx="3"/>
            <rect x="225" y="215" width="68" height="40" rx="3"/>
            <rect x="305" y="215" width="45" height="40" rx="3"/>
          </g>
          <path d="M 298 35 L 298 55 L 298 100 L 298 108 L 216 108 L 143 108 L 143 155 L 143 150 L 64 150 L 64 205 L 64 210 L 143 210 L 215 210 L 215 155 L 215 150 L 298 150 L 298 100" stroke="#3B82F6" stroke-width="3.5" stroke-dasharray="10 6" stroke-linecap="round" stroke-linejoin="round" fill="none" class="route-path-animated"/>
          <circle cx="298" cy="35" r="16" fill="#60A5FA" stroke="white" stroke-width="2.5"/>
          <path d="M292 35 L296 39 L305 30" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="64" cy="210" r="12" fill="#1E3A8A" stroke="white" stroke-width="2"/>
          <text x="64" y="215" text-anchor="middle" font-size="12" font-weight="800" fill="white" font-family="Outfit, sans-serif">B</text>
          <circle cx="143" cy="130" r="14" fill="white" stroke="#3B82F6" stroke-width="2"/>
          <polygon points="143,123 137,138 149,138" fill="#3B82F6"/>
          <!-- Numbered Spots like sketch -->
          <g class="map-spot-marker">
            <circle cx="298" cy="108" r="18" fill="#047857" />
            <text x="298" y="113" text-anchor="middle" font-size="14" fill="white" font-weight="800" font-family="Outfit, sans-serif">1</text>
          </g>
          <g class="map-spot-marker">
            <circle cx="143" cy="108" r="18" fill="#047857" />
            <text x="143" y="113" text-anchor="middle" font-size="14" fill="white" font-weight="800" font-family="Outfit, sans-serif">2</text>
          </g>
          <g class="map-spot-marker">
            <circle cx="64" cy="150" r="18" fill="#047857" />
            <text x="64" y="155" text-anchor="middle" font-size="14" fill="white" font-weight="800" font-family="Outfit, sans-serif">3</text>
          </g>
          <g class="map-spot-marker">
            <circle cx="215" cy="210" r="18" fill="#047857" />
            <text x="215" y="215" text-anchor="middle" font-size="14" fill="white" font-weight="800" font-family="Outfit, sans-serif">4</text>
          </g>
        </svg>
      </div>
    </div>

    <!-- ===== CHAT SECTION ===== -->
    <div class="ac-chat-panel">
      <!-- Drag handle -->
      <div class="rd-panel-handle"></div>
      
      <!-- Header -->
      <div class="ac-chat-header">
        <div class="ac-ai-title-wrap">
          <h2 class="ac-ai-name">AI导游-小go</h2>
          <button class="ac-avatar-icon-btn" id="ac-avatar-icon-btn" aria-label="头像">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8.2" r="4.1" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 20C4.6 16.4 7.9 14 12 14C16.1 14 19.4 16.4 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="ac-header-right">
          <div class="ac-progress-wrap">
            <div class="ac-progress-row">
              <div class="ac-progress-track">
                <div class="ac-progress-fill" style="width:42%;"></div>
              </div>
              <span class="ac-progress-percent">42%</span>
            </div>
          </div>
          <button class="ac-reward-btn" id="ac-reward-btn" aria-label="收获">
            <span class="ac-reward-icon" aria-hidden="true">🎁</span>
            收获
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="ac-chat-messages" id="ac-chat-messages">
        <!-- Injected via JS -->
      </div>

      <!-- Input -->
      <div class="ac-chat-input-area">
        <button class="ac-btn-keyboard" aria-label="键盘输入">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <rect x="2.2" y="4.8" width="19.6" height="14.4" rx="2.4" stroke="currentColor" stroke-width="1.8"/>
            <rect x="4.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="7.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="10.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="13.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="16.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="4.8" y="10.6" width="2.3" height="2" rx="0.5" fill="currentColor"/>
            <rect x="8.1" y="10.6" width="2.3" height="2" rx="0.5" fill="currentColor"/>
            <rect x="11.4" y="10.6" width="2.3" height="2" rx="0.5" fill="currentColor"/>
            <rect x="14.7" y="10.6" width="5.1" height="2" rx="0.5" fill="currentColor"/>
            <rect x="4.8" y="13.6" width="11.6" height="2.2" rx="0.7" fill="currentColor"/>
            <rect x="17.2" y="13.6" width="2.6" height="2.2" rx="0.7" fill="currentColor"/>
          </svg>
        </button>
        <button class="ac-btn-voice">按住说话</button>
      </div>
    </div>

  </div>

  <script src="ai-chat.js"></script>
</body>
</html>
