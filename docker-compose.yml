version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: wego
      POSTGRES_USER: wego
      POSTGRES_PASSWORD: wego_pass_change_me
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      BACKEND_PORT: 8787
      DATABASE_URL: postgresql://wego:wego_pass_change_me@postgres:5432/wego
      JWT_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      INTERNAL_API_TOKEN: change-me-internal
      AGENT_BASE_URL: http://agent:8000
      PUBLIC_BASE_URL: http://localhost
    depends_on:
      - postgres
      - agent
    ports:
      - "8787:8787"
    volumes:
      - storage_data:/app/storage

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      BACKEND_API_URL: http://backend:8787
      INTERNAL_API_TOKEN: change-me-internal
      AGENT_ACCESS_TOKEN: ""
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./src:/usr/share/nginx/html:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
  storage_data:
