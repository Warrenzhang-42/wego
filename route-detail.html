<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>大栅栏杨梅竹斜街非遗体验 · WeGO</title>
  <meta name="description" content="沿杨梅竹斜街探访兔儿爷、青云阁与胡同手作，感受大栅栏片区的非遗与慢游" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="route-detail.css" />
</head>
<body>
  <div id="app" class="rd-route-page">

    <!-- ===== MAP SECTION ===== -->
    <div class="rd-map-wrapper" id="rd-map-wrapper">
      <!-- Back button -->
      <button class="rd-back-btn" id="rd-back-btn" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Map canvas -->
      <div class="rd-map-canvas">
        <!-- SVG Map with route and spots -->
        <svg id="rd-map-svg" viewBox="0 0 390 280" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
          <!-- Map background (street grid) -->
          <rect width="390" height="280" fill="#EFF1F0"/>

          <!-- Streets background -->
          <g stroke="#D8DCE0" stroke-width="9" stroke-linecap="round">
            <!-- Horizontal streets -->
            <line x1="0" y1="55"  x2="390" y2="55"/>
            <line x1="0" y1="100" x2="390" y2="108"/>
            <line x1="0" y1="155" x2="390" y2="150"/>
            <line x1="0" y1="210" x2="390" y2="205"/>
            <line x1="0" y1="260" x2="390" y2="260"/>
            <!-- Vertical streets -->
            <line x1="60"  y1="0" x2="65"  y2="280"/>
            <line x1="140" y1="0" x2="145" y2="280"/>
            <line x1="220" y1="0" x2="215" y2="280"/>
            <line x1="300" y1="0" x2="298" y2="280"/>
            <line x1="360" y1="0" x2="360" y2="280"/>
          </g>
          <!-- Streets highlight (lighter) -->
          <g stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.6">
            <line x1="0" y1="55"  x2="390" y2="55"/>
            <line x1="0" y1="100" x2="390" y2="108"/>
            <line x1="0" y1="155" x2="390" y2="150"/>
            <line x1="0" y1="210" x2="390" y2="205"/>
            <line x1="0" y1="260" x2="390" y2="260"/>
            <line x1="60"  y1="0" x2="65"  y2="280"/>
            <line x1="140" y1="0" x2="145" y2="280"/>
            <line x1="220" y1="0" x2="215" y2="280"/>
            <line x1="300" y1="0" x2="298" y2="280"/>
            <line x1="360" y1="0" x2="360" y2="280"/>
          </g>

          <!-- Blocks / Buildings -->
          <g fill="#E2E5E3" stroke="#D0D4D2" stroke-width="0.5">
            <rect x="70" y="5"  width="65" height="44" rx="3"/>
            <rect x="150" y="5" width="60" height="44" rx="3"/>
            <rect x="225" y="5" width="68" height="44" rx="3"/>
            <rect x="305" y="5" width="45" height="44" rx="3"/>

            <rect x="70"  y="65"  width="65" height="37" rx="3"/>
            <rect x="150" y="65"  width="60" height="30" rx="3"/>
            <rect x="155" y="75"  width="50" height="38" rx="3"/>
            <rect x="225" y="65"  width="68" height="38" rx="3"/>
            <rect x="305" y="65"  width="45" height="38" rx="3"/>

            <rect x="5"   y="115" width="50" height="33" rx="3"/>
            <rect x="70"  y="115" width="65" height="33" rx="3"/>
            <rect x="150" y="115" width="60" height="28" rx="3"/>
            <rect x="225" y="118" width="68" height="25" rx="3"/>
            <rect x="305" y="115" width="45" height="33" rx="3"/>

            <rect x="5"   y="160" width="50" height="43" rx="3"/>
            <rect x="70"  y="160" width="65" height="43" rx="3"/>
            <rect x="150" y="160" width="60" height="43" rx="3"/>
            <rect x="225" y="160" width="68" height="43" rx="3"/>
            <rect x="305" y="160" width="45" height="43" rx="3"/>

            <rect x="5"   y="215" width="50" height="40" rx="3"/>
            <rect x="70"  y="215" width="65" height="40" rx="3"/>
            <rect x="150" y="215" width="60" height="40" rx="3"/>
            <rect x="225" y="215" width="68" height="40" rx="3"/>
            <rect x="305" y="215" width="45" height="40" rx="3"/>
          </g>

          <!-- Route Path (dashed blue loop) -->
          <path 
            d="M 298 35 L 298 55 L 298 100 L 298 108 L 216 108 L 143 108 L 143 155 L 143 150 L 64 150 L 64 205 L 64 210 L 143 210 L 215 210 L 215 155 L 215 150 L 298 150 L 298 100"
            stroke="#3B82F6" stroke-width="3.5" stroke-dasharray="10 6" stroke-linecap="round" stroke-linejoin="round" fill="none"
            class="route-path-animated"
          />

          <!-- Start marker (top right, checkmark circle) -->
          <circle cx="298" cy="35" r="16" fill="#60A5FA" stroke="white" stroke-width="2.5"/>
          <path d="M292 35 L296 39 L305 30" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

          <!-- End marker B (bottom left) -->
          <circle cx="64" cy="210" r="12" fill="#1E3A8A" stroke="white" stroke-width="2"/>
          <text x="64" y="215" text-anchor="middle" font-size="12" font-weight="800" fill="white" font-family="Outfit, sans-serif">B</text>

          <!-- Current position (triangle/navigation arrow) -->
          <circle cx="143" cy="130" r="14" fill="white" stroke="#3B82F6" stroke-width="2"/>
          <polygon points="143,123 137,138 149,138" fill="#3B82F6"/>

          <!-- Spot markers (clickable) – 5 spots · 杨梅竹斜街非遗线 -->
          <g class="map-spot-marker" data-spot="0" transform="translate(298, 108)" style="cursor:pointer;">
            <circle r="18" fill="#6EE7B7" fill-opacity="0.3" />
            <circle r="13" fill="#34D399" />
            <text y="4" text-anchor="middle" font-size="13" fill="white" font-weight="800" font-family="Outfit, sans-serif">1</text>
          </g>
          <g class="map-spot-marker" data-spot="1" transform="translate(143, 108)" style="cursor:pointer;">
            <circle r="18" fill="#6EE7B7" fill-opacity="0.3" />
            <circle r="13" fill="#34D399" />
            <text y="4" text-anchor="middle" font-size="13" fill="white" font-weight="800" font-family="Outfit, sans-serif">2</text>
          </g>
          <g class="map-spot-marker" data-spot="2" transform="translate(64, 150)" style="cursor:pointer;">
            <circle r="18" fill="#6EE7B7" fill-opacity="0.3" />
            <circle r="13" fill="#34D399" />
            <text y="4" text-anchor="middle" font-size="13" fill="white" font-weight="800" font-family="Outfit, sans-serif">3</text>
          </g>
          <g class="map-spot-marker" data-spot="3" transform="translate(215, 210)" style="cursor:pointer;">
            <circle r="18" fill="#6EE7B7" fill-opacity="0.3" />
            <circle r="13" fill="#34D399" />
            <text y="4" text-anchor="middle" font-size="13" fill="white" font-weight="800" font-family="Outfit, sans-serif">4</text>
          </g>
          <g class="map-spot-marker" data-spot="4" transform="translate(298, 175)" style="cursor:pointer;">
            <circle r="18" fill="#6EE7B7" fill-opacity="0.3" />
            <circle r="13" fill="#34D399" />
            <text y="4" text-anchor="middle" font-size="13" fill="white" font-weight="800" font-family="Outfit, sans-serif">5</text>
          </g>

          <!-- Spot labels -->
          <text x="298" y="86" text-anchor="middle" font-size="9.5" fill="#374151" font-family="Outfit, sans-serif" font-weight="600">兔儿爷店</text>
          <text x="112" y="93" text-anchor="middle" font-size="9.5" fill="#374151" font-family="Outfit, sans-serif" font-weight="600">青云阁</text>
          <text x="38" y="135" text-anchor="middle" font-size="9.5" fill="#374151" font-family="Outfit, sans-serif" font-weight="600">乾坤空间</text>
          <text x="215" y="192" text-anchor="middle" font-size="9.5" fill="#374151" font-family="Outfit, sans-serif" font-weight="600">将将堂</text>
          <text x="325" y="159" text-anchor="middle" font-size="9.5" fill="#374151" font-family="Outfit, sans-serif" font-weight="600">铃木食堂</text>
        </svg>

        <!-- Spot tooltip -->
        <div class="map-spot-tooltip" id="map-spot-tooltip">
          <div class="mst-name"></div>
          <div class="mst-desc"></div>
        </div>
      </div>

      <!-- Fullscreen map / collapse sheet — top right, symmetric to back -->
      <button type="button" class="rd-fullscreen-btn" id="rd-fullscreen-btn" aria-label="展开地图">
        <svg class="rd-fs-icon-expand" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M2 7V3H6M14 3H18V7M18 13V17H14M6 17H2V13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="rd-fs-icon-collapse" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M7 3H3V7M13 3H17V7M17 13V17H13M7 17H3V13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- ===== DETAIL PANEL ===== -->
    <div class="rd-detail-panel" id="rd-detail-panel">

      <!-- Panel drag handle -->
      <div class="rd-panel-handle"></div>

      <!-- Route header info -->
      <div class="rd-header">
        <div class="rd-header-main">
          <h1 class="rd-title">大栅栏杨梅竹斜街非遗体验</h1>
        </div>
        <p class="rd-subtitle">从兔儿爷泥塑到胡同咖啡与钤印手作，把「看得见的非遗」和「带得走的记忆」放进同一条斜街里；全程步行约 2.5～3.5 小时，可按店休与排队灵活拆成半日或整日。</p>

          <!-- Heat + Tags -->
          <div class="rd-meta-row">
            <div class="route-heat">
              <span class="heat-label">热度</span>
              <div class="heat-dots">
                <span class="heat-dot hot"></span>
                <span class="heat-dot hot"></span>
                <span class="heat-dot hot"></span>
                <span class="heat-dot hot"></span>
                <span class="heat-dot half"></span>
              </div>
              <span class="heat-num">15.6k</span>
            </div>
            <div class="rd-tags-row">
              <span class="tag tag-culture">非遗</span>
              <span class="tag tag-history">胡同</span>
              <span class="tag tag-walking">手作</span>
            </div>
          </div>
  
          <!-- Stats Summary Row (Aligned with Heat) -->
          <div class="rd-stats-row">
            <div class="rd-stat-badge" title="景点数量">
              <span class="rd-stat-icon">📍</span>
              <div class="rd-stat-info-box">
                <span class="rd-stat-val">5</span>
                <span class="rd-stat-key">景点</span>
              </div>
            </div>
            <div class="rd-stat-badge" title="故事数量">
              <span class="rd-stat-icon">📖</span>
              <div class="rd-stat-info-box">
                <span class="rd-stat-val">2</span>
                <span class="rd-stat-key">故事</span>
              </div>
            </div>
            <div class="rd-stat-badge" title="彩蛋数量">
              <span class="rd-stat-icon">🥚</span>
              <div class="rd-stat-info-box">
                <span class="rd-stat-val">8</span>
                <span class="rd-stat-key">彩蛋</span>
              </div>
            </div>
            <div class="rd-stat-badge" title="知识卡片">
              <span class="rd-stat-icon">💡</span>
              <div class="rd-stat-info-box">
                <span class="rd-stat-val">3</span>
                <span class="rd-stat-key">知识</span>
              </div>
            </div>
            <div class="rd-stat-badge" title="活动数量">
              <span class="rd-stat-icon">🎯</span>
              <div class="rd-stat-info-box">
                <span class="rd-stat-val">2</span>
                <span class="rd-stat-key">活动</span>
              </div>
            </div>
          </div>
        </div>


      <!-- Spot List Title -->
      <div class="rd-section-header">
        <h2 class="rd-section-title"><span class="rd-section-icon">📍</span> 景点列表</h2>
      </div>

      <!-- ===== SPOT LIST ===== -->
      <div class="rd-spot-list" id="rd-spot-list"></div><!-- /.rd-spot-list -->

    </div><!-- /.rd-detail-panel -->

    <!-- Spacer for bottom bar -->
    <div style="height: 90px;"></div>

  </div><!-- #app -->

  <!-- ===== BOTTOM ACTION BAR ===== -->
  <div class="rd-bottom-bar" id="rd-bottom-bar">
    <button class="rd-start-btn" id="rd-start-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <polygon points="5,3 15,9 5,15" fill="white"/>
      </svg>
      开始旅程
    </button>
    <button class="rd-ai-btn" id="rd-ai-btn">
      问问导游
    </button>
    <button class="rd-fav-btn" id="rd-fav-btn" aria-label="收藏">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
    </button>
  </div>

  <!-- ===== FULLSCREEN OVERLAY ===== -->
  <div class="rd-fullscreen-overlay" id="rd-fullscreen-overlay" aria-hidden="true">
    <div class="rd-fs-map-container">
      <!-- reuse same svg in fullscreen via JS clone -->
    </div>
    <button class="rd-fs-close-btn" id="rd-fs-close-btn" aria-label="退出全屏">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M5 5L15 15M15 5L5 15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
    <!-- Fullscreen bottom sheet panel -->
    <div class="rd-fs-bottom-sheet" id="rd-fs-bottom-sheet">
      <div class="rd-panel-handle"></div>
      <div class="rd-fs-sheet-content">
        <h2 class="rd-fs-route-name">大栅栏杨梅竹斜街非遗体验</h2>
        <div class="rd-fs-spot-pills" id="rd-fs-spot-pills">
          <button class="rd-fs-pill active" data-spot="0">① 兔儿爷传承店</button>
          <button class="rd-fs-pill" data-spot="1">② 青云阁·模范咖啡</button>
          <button class="rd-fs-pill" data-spot="2">③ 乾坤空间文创</button>
          <button class="rd-fs-pill" data-spot="3">④ 将将堂印章</button>
          <button class="rd-fs-pill" data-spot="4">⑤ 铃木食堂</button>
        </div>
      </div>
    </div>
  </div>

  <script src="route-detail.js"></script>
</body>
</html>
