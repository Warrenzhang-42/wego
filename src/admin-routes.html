<!DOCTYPE html>

<!-- ================================================================
     ADMIN HEADER
     ================================================================ -->
<header class="admin-header">
  <div class="admin-header__left">
    <div class="admin-header__brand">WeGO 内容管理后台</div>
    <nav class="admin-header__tabs" aria-label="后台分区">
      <button type="button" class="admin-nav-tab active" data-admin-view="list">路线列表</button>
      <button type="button" class="admin-nav-tab" data-admin-view="upload">路线上传</button>
    </nav>
  </div>
  <nav class="admin-header__nav">
    <a href="http://127.0.0.1:5173/" target="_blank">返回前台</a>
    <span class="admin-header__mode">SERVICE ROLE</span>
  </nav>
</header>

<!-- ================================================================
     MAIN: 路线列表
     ================================================================ -->
<div id="admin-view-list">
<main class="admin-page">

  <!-- Page Title -->
  <div style="margin-bottom: 20px; display:flex; align-items:baseline; gap:12px;">
    <h1 style="font-family:var(--font-head); font-size:22px; font-weight:700; color:var(--clr-text-h);">路线管理</h1>
    <span class="text-muted text-sm" id="total-count"></span>
  </div>

  <!-- Toolbar -->
  <div class="admin-toolbar">
    <div class="admin-toolbar__search">
      <span class="admin-toolbar__search-icon">
        <svg width="16" height="16"><use href="#icon-search"/></svg>
      </span>
      <input type="text" id="search-input" placeholder="搜索路线名称…" autocomplete="off">
    </div>

    <select id="filter-category">
      <option value="">全部分类</option>
      <option value="本地">本地</option>
      <option value="推荐">推荐</option>
      <option value="美食">美食</option>
      <option value="文化">文化</option>
      <option value="自然">自然</option>
    </select>

    <button type="button" class="btn btn-primary" id="btn-new-route" style="height:38px; padding:0 14px;">新增路线</button>

    <button class="btn btn-secondary" id="btn-reset" style="height:38px; padding:0 14px;">重置</button>
  </div>

  <!-- Table -->
  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th style="width:240px;">路线名称</th>
          <th>标签</th>
          <th>分类</th>
          <th style="width:72px;">可见</th>
          <th style="width:64px;">版本</th>
          <th style="width:90px;">热度</th>
          <th style="width:90px;">热度值</th>
          <th style="width:120px;">操作</th>
        </tr>
      </thead>
      <tbody id="routes-tbody">
        <tr class="loading-row">
          <td colspan="8">
            <span style="display:inline-flex;align-items:center;gap:8px;">
              <svg width="18" height="18" class="spin"><use href="#icon-loading"/></svg>
              加载中…
            </span>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Pagination -->
    <div class="admin-pagination" id="pagination" style="display:none;">
      <div class="admin-pagination__info" id="pagination-info"></div>
      <div class="admin-pagination__controls" id="pagination-controls"></div>
    </div>
  </div>
</main>
</div><!-- #admin-view-list -->

<!-- ================================================================
     路线上传（PC）：Edge route-ingest + Agent 解析与 Gap 引导
     ================================================================ -->
<div id="admin-view-upload" class="admin-page admin-upload-page" hidden>
  <section class="admin-upload-intro" aria-labelledby="admin-upload-heading">
    <h1 id="admin-upload-heading">路线上传</h1>
    <p class="admin-upload-intro__text">
      在下方提交 JSON / Markdown / 文本或 URL。请求由 <strong>Supabase route-ingest</strong> 接收并调用
      <strong>Python Agent</strong> 解析路线、识别待补充字段；若有 Gap，请按对话引导补全后再确认入库。
    </p>
  </section>
  <div class="admin-upload-shell">
    <div class="admin-ur-toolbar">
      <button type="button" class="admin-ur-back" id="admin-ur-back-btn" aria-label="返回上一步" style="visibility:hidden">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h2 class="admin-ur-phase-title" id="admin-ur-nav-title">上传路线</h2>
    </div>
    <div id="admin-ur-main" class="admin-ur-main"></div>
  </div>
</div>

<!-- ================================================================
     MODAL: EDIT ROUTE
     ================================================================ -->
<div class="modal-overlay" id="modal-edit-route" role="dialog" aria-modal="true" aria-labelledby="modal-route-title">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="modal-route-title">编辑路线</h2>
      <button class="modal__close" onclick="closeModal('modal-edit-route')" aria-label="关闭">
        <svg width="16" height="16"><use href="#icon-x"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <form id="form-edit-route" novalidate>
        <input type="hidden" id="route-edit-id">

        <div class="form-grid">
          <div class="form-field full">
            <label class="form-label" for="route-title">标题 *</label>
            <input class="form-input" type="text" id="route-title" required placeholder="路线名称">
          </div>

          <div class="form-field full">
            <label class="form-label" for="route-description">描述</label>
            <textarea class="form-textarea" id="route-description" rows="3" placeholder="路线描述（可选）"></textarea>
          </div>

          <div class="form-field">
            <label class="form-label" for="route-category">分类</label>
            <select class="form-select" id="route-category">
              <option value="">未分类</option>
              <option value="本地">本地</option>
              <option value="推荐">推荐</option>
              <option value="美食">美食</option>
              <option value="文化">文化</option>
              <option value="自然">自然</option>
            </select>
          </div>

          <div class="form-field">
            <label class="form-label" for="route-visible">
              <input type="checkbox" id="route-visible" checked> 路线对外可见
            </label>
          </div>

          <div class="form-field full">
            <label class="form-label--readonly">已发布版本 / 最近发布</label>
            <input class="form-input" type="text" id="route-version-ro" readonly tabindex="-1" placeholder="—">
          </div>

          <div class="form-field">
            <label class="form-label--readonly" for="route-duration">预计时长（分钟，自动）</label>
            <input class="form-input" type="number" id="route-duration" min="0" readonly tabindex="-1">
          </div>

          <div class="form-field">
            <label class="form-label--readonly" for="route-distance">总距离（km，自动）</label>
            <input class="form-input" type="number" id="route-distance" min="0" step="0.1" readonly tabindex="-1">
          </div>

          <div class="form-field full">
            <label class="form-label" for="route-cover">封面图 URL</label>
            <input class="form-input" type="url" id="route-cover" placeholder="https://…">
          </div>

          <div class="form-field full">
            <label class="form-label">标签（英文逗号分隔）</label>
            <div class="form-tags-input" id="route-tags-container">
              <input type="text" id="route-tags-input" placeholder="输入后按回车添加标签">
            </div>
            <div class="tags-list" id="route-tags-preview" style="margin-top:6px;"></div>
          </div>

          <!-- Read-only heat fields — NO input控件 -->
          <div class="form-field">
            <label class="form-label--readonly">热度点数</label>
            <input class="form-input" type="text" id="route-heat-level-ro" readonly tabindex="-1">
          </div>
          <div class="form-field">
            <label class="form-label--readonly">热度累计</label>
            <input class="form-input" type="text" id="route-heat-count-ro" readonly tabindex="-1">
          </div>
        </div>
      </form>
    </div>
    <div class="modal__footer" style="flex-wrap:wrap;gap:8px;">
      <span class="text-sm text-muted" id="route-draft-status" style="margin-right:auto;"></span>
      <button class="btn btn-secondary" onclick="closeModal('modal-edit-route')">关闭</button>
      <button class="btn btn-secondary" id="btn-save-route-draft" type="button">保存草稿</button>
      <button class="btn btn-primary" id="btn-publish-route" type="button">发布</button>
    </div>
  </div>
</div>

<!-- ================================================================
     MODAL: EDIT SPOT
     ================================================================ -->
<div class="modal-overlay" id="modal-edit-spot" role="dialog" aria-modal="true" aria-labelledby="modal-spot-title">
  <div class="modal">
    <div class="modal__header">

    <div class="modal__body">
      <form id="form-edit-spot" novalidate>
        <input type="hidden" id="spot-edit-id">

        <div class="form-grid">
          <div class="form-field full">
            <label class="form-label" for="spot-name">景点名称 *</label>
            <input class="form-input" type="text" id="spot-name" required placeholder="景点名称">

          <div class="form-field full">

          <div class="form-field full">

            <textarea class="form-textarea" id="spot-short-desc" rows="2" placeholder="短描述（可选）"></textarea>
          </div>

          <div class="form-field">
            <label class="form-label" for="spot-type">游玩点类型</label>
            <select class="form-select" id="spot-type">
              <option value="attraction">景点</option>
              <option value="shop">商店</option>
              <option value="photo_spot">最佳拍照点</option>
              <option value="knowledge">知识点</option>

          <div class="form-field full">
            <label class="form-label" for="spot-rich">图文内容</label>

          <div class="form-field">
            <label class="form-label" for="spot-input-frame">坐标输入参照</label>

              <option value="WGS84">WGS-84（GPS / Google）</option>
              <option value="GCJ02">GCJ-02（高德 / 国内图商拾取）</option>

          <div class="form-field">
            <label class="form-label" for="spot-lat">纬度（lat）</label>
            <input class="form-input" type="number" id="spot-lat" step="0.0000001" min="-90" max="90" placeholder="例如 39.8951">
          </div>

          <div class="form-field">
            <label class="form-label" for="spot-lng">经度（lng）</label>
            <input class="form-input" type="number" id="spot-lng" step="0.0000001" min="-180" max="180" placeholder="例如 116.3942">
          </div>

          <div class="form-field full" style="display:flex;flex-wrap:wrap;gap:16px;">
            <label class="form-label" for="spot-visible" style="display:flex;align-items:center;gap:8px;">
              <input type="checkbox" id="spot-visible" checked> 参与列表与路径计算

            <label class="form-label" for="spot-easter" style="display:flex;align-items:center;gap:8px;">
              <input type="checkbox" id="spot-easter"> 彩蛋（默认不出现在列表/地图/路径）

          <div class="form-field">
            <label class="form-label" for="spot-stay">建议停留（分钟）</label>
            <input class="form-input" type="number" id="spot-stay" min="0" placeholder="例如 30">
          </div>

          <div class="form-field">
            <label class="form-label" for="spot-geofence">围栏半径（米）</label>
            <input class="form-input" type="number" id="spot-geofence" min="1" placeholder="默认 30">
          </div>

          <div class="form-field">
            <label class="form-label" for="spot-sort">排序序号</label>
            <input class="form-input" type="number" id="spot-sort" min="1" placeholder="从 1 开始">
          </div>

          <div class="form-field full">
            <label class="form-label" for="spot-thumb">缩略图 URL</label>
            <input class="form-input" type="url" id="spot-thumb" placeholder="https://…">
          </div>

          <div class="form-field full">
            <label class="form-label">标签（英文逗号分隔）</label>
            <div class="form-tags-input" id="spot-tags-container">
              <input type="text" id="spot-tags-input" placeholder="输入后按回车添加标签">
            </div>
            <div class="tags-list" id="spot-tags-preview" style="margin-top:6px;"></div>
          </div>

          <div class="form-field full">
            <label class="form-label">图片 URL（每行一个）</label>
            <textarea class="form-textarea" id="spot-photos" rows="3" placeholder="https://图片1.jpg&#10;https://图片2.jpg"></textarea>
            <div class="photos-list" id="spot-photos-preview" style="margin-top:8px;"></div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal__footer" style="flex-wrap:wrap;gap:8px;">
      <span class="text-sm text-muted" id="spot-draft-status" style="margin-right:auto;"></span>
      <button class="btn btn-secondary" onclick="closeModal('modal-edit-spot')">关闭</button>
      <button class="btn btn-primary" id="btn-save-spot" type="button">保存</button>
    </div>
  </div>
</div>

<script type="module">
import { adminApi } from './lib/admin-api.js';
import { initAdminRouteUploadPanel } from './admin-route-upload.js';
import { normalizeToWgs84 } from './lib/coordinate-frame.js';

/* ============================================================
   State
   ============================================================ */
let currentPage = 1;
const PAGE_SIZE = 20;
let pendingDeleteRouteId = null;
let pendingDeleteSpotId = null;

/* ============================================================
   Bootstrap
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  bindToolbarEvents();
  bindTagInput('route-tags-input', 'route-tags-container', 'route-tags-preview', 'route');
  bindTagInput('spot-tags-input', 'spot-tags-container', 'spot-tags-preview', 'spot');
  document.getElementById('btn-save-route-draft').addEventListener('click', () => saveRoute(true));
  document.getElementById('btn-publish-route').addEventListener('click', publishRouteAction);
  document.getElementById('btn-save-spot').addEventListener('click', () => saveSpot());
  document.getElementById('btn-new-route').addEventListener('click', createNewRoute);
  loadRoutes();
  initAdminRouteUploadPanel();
  bindRouteModalAutosave();
});

/* ============================================================
   Toolbar
   ============================================================ */
function bindToolbarEvents() {
  const searchInput = document.getElementById('search-input');
  const catSelect = document.getElementById('filter-category');
  const btnReset = document.getElementById('btn-reset');

  let debounceTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { currentPage = 1; loadRoutes(); }, 350);
  });

  catSelect.addEventListener('change', () => { currentPage = 1; loadRoutes(); });
  btnReset.addEventListener('click', () => {
    searchInput.value = '';
    catSelect.value = '';
    currentPage = 1;
    loadRoutes();
  });
}

async function loadRoutes() {

  tbody.innerHTML = `<tr class="loading-row"><td colspan="8">
    <span style="display:inline-flex;align-items:center;gap:8px;">
      <svg width="18" height="18" class="spin"><use href="#icon-loading"/></svg> 加载中…
    </span>
  </td></tr>`;

  try {
    const search = document.getElementById('search-input').value.trim();
    const category = document.getElementById('filter-category').value;
    const { data, total, page, pageSize } = await adminApi.getRoutesAdmin({
      search: search || undefined,
      category: category || undefined,
      page: currentPage,
      pageSize: PAGE_SIZE,
    });

    document.getElementById('total-count').textContent =
      total > 0 ? `共 ${total} 条路线` : '';

      tbody.innerHTML = `<tr><td colspan="8">

/* ============================================================
   Toggle Spots
   ============================================================ */
const _spotsCache = {};

async function toggleSpots(routeId) {
  const spotsRow = document.getElementById(`spots-row-${routeId}`);
  const container = document.getElementById(`spots-container-${routeId}`);
  const btn = document.getElementById(`expand-btn-${routeId}`);
  const isOpen = spotsRow.style.display !== 'none';

  if (isOpen) {
    spotsRow.style.display = 'none';
    btn.classList.remove('open');
    return;
  }

  spotsRow.style.display = '';
  btn.classList.add('open');

  if (_spotsCache[routeId]) {
    container.innerHTML = renderSpotsGrid(_spotsCache[routeId], routeId);
    return;
  }

  try {
    const spots = await adminApi.getSpotsAdmin(routeId);
    _spotsCache[routeId] = spots;
    container.innerHTML = renderSpotsGrid(spots, routeId);
  } catch (err) {
    container.innerHTML = `<div class="text-danger" style="padding:16px;font-size:13px;">加载失败：${err.message}</div>`;
  }
}

function renderSpotsGrid(spots, routeId) {
  const addBtn = routeId ? `<div style="margin-bottom:12px;">
    <button type="button" class="btn btn-secondary btn-sm" onclick="addNewSpot('${routeId}')">＋ 添加景点</button>
  </div>` : '';

  if (!spots || spots.length === 0) {
    return `${addBtn}<div class="empty-state" style="padding:30px 0;">
      <div class="empty-state__title">暂无游玩点</div>
    </div>`;
  }

  const cards = spots.map(spot => `
  <div class="spot-card" id="spot-card-${spot.id}">
    <div class="spot-card__header">
      <span class="spot-card__order">${spot.sort_order || '?'}</span>
      <span class="spot-card__name">${escHtml(spot.name)}</span>
      ${spot.is_visible === false ? '<span class="text-sm text-muted">隐藏</span>' : ''}
      ${spot.is_easter_egg ? '<span class="text-sm" style="color:#a67c52;">彩蛋</span>' : ''}
    </div>
    ${spot.subtitle ? `<div class="spot-card__subtitle">${escHtml(spot.subtitle)}</div>` : ''}
    ${spot.thumb ? `<div class="spot-card__thumb"><img src="${escHtml(spot.thumb)}" alt="${escHtml(spot.name)}" onerror="this.style.display='none'"></div>` : ''}
    <div class="spot-card__coords">
      <svg width="10" height="10" style="display:inline;vertical-align:middle;margin-right:3px;"><use href="#icon-map-pin"/></svg>
      ${spot.lat?.toFixed(5)}, ${spot.lng?.toFixed(5)}
    </div>
    ${(spot.tags || []).length > 0
      ? `<div class="tags-list" style="margin-top:6px;">${spot.tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')}</div>`
      : ''}
    <div class="spot-card__actions">
      <button class="btn btn-ghost btn-sm" onclick="openEditSpot('${spot.id}', '${spot.route_id}')">
        <svg width="12" height="12"><use href="#icon-edit"/></svg> 编辑
      </button>
      <button class="btn btn-ghost btn-sm text-danger" onclick="openDeleteSpot('${spot.id}', '${escHtml(spot.name)}')">
        <svg width="12" height="12"><use href="#icon-trash"/></svg> 删除
      </button>
    </div>
  </div>`).join('');

  return `${addBtn}<div class="spots-grid">${cards}</div>`;

/* ============================================================
   Pagination
   ============================================================ */
function renderPagination(total, page, pageSize) {
  const pagination = document.getElementById('pagination');
  const info = document.getElementById('pagination-info');
  const controls = document.getElementById('pagination-controls');

  const totalPages = Math.ceil(total / pageSize);
  if (totalPages <= 1) {
    pagination.style.display = 'none';
    return;
  }

  pagination.style.display = 'flex';
  const from = (page - 1) * pageSize + 1;
  const to = Math.min(page * pageSize, total);
  info.textContent = `第 ${from}–${to} 条，共 ${total} 条`;

  const maxVisible = 5;
  let start = Math.max(1, page - Math.floor(maxVisible / 2));
  let end = Math.min(totalPages, start + maxVisible - 1);
  if (end - start + 1 < maxVisible) start = Math.max(1, end - maxVisible + 1);

  let html = `<button class="page-btn" onclick="goPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>‹</button>`;

  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn${i === page ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  html += `<button class="page-btn" onclick="goPage(${page + 1})" ${page === totalPages ? 'disabled' : ''}>›</button>`;
  controls.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  loadRoutes();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let _routeDraftTimer = null;
let _routeModalDirty = false;

function bindRouteModalAutosave() {
  const modal = document.getElementById('modal-edit-route');
  const debounceMs = 900;
  const fields = ['route-title', 'route-description', 'route-category', 'route-cover', 'route-visible'];
  fields.forEach((fid) => {

      scheduleRouteDraftSave(debounceMs);

function scheduleRouteDraftSave(ms) {
  clearTimeout(_routeDraftTimer);
  _routeDraftTimer = setTimeout(() => {
    const id = document.getElementById('route-edit-id').value;
    if (!id || !_routeModalDirty) return;
    saveRoute(false, true);

}

async function saveRoute(showToast = true, silent = false) {
  const id = document.getElementById('route-edit-id').value;

    description: document.getElementById('route-description').value.trim() || null,

async function addNewSpot(routeId) {
  try {
    const spots = await adminApi.getSpotsAdmin(routeId);
    const maxOrder = spots.reduce((m, s) => Math.max(m, Number(s.sort_order) || 0), 0);
    const ref = spots.find((s) => s.is_visible !== false && !s.is_easter_egg) || spots[0];
    const lat = ref ? Number(ref.lat) : 39.9042;
    const lng = ref ? Number(ref.lng) : 116.4074;
    const spot = await adminApi.insertSpot({
      route_id: routeId,
      name: '新游玩点',
      lat,
      lng,
      sort_order: maxOrder + 1,
      geofence_radius_m: 30,
      is_visible: true,
      is_easter_egg: false,
      spot_type: 'attraction',
    });
    delete _spotsCache[routeId];
    await openEditSpot(spot.id, routeId);
    const row = document.getElementById(`spots-row-${routeId}`);
    if (row && row.style.display !== 'none') {
      const container = document.getElementById(`spots-container-${routeId}`);
      const list = await adminApi.getSpotsAdmin(routeId);
      _spotsCache[routeId] = list;
      container.innerHTML = renderSpotsGrid(list, routeId);
    }
  } catch (err) {
    toast('error', `添加失败：${err.message}`);
  }
}

async function saveSpot() {
  const id = document.getElementById('spot-edit-id').value;
  if (!id) return;

  const name = document.getElementById('spot-name').value.trim();
  if (!name) { toast('error', '游玩点名称不能为空'); return; }

  const photosRaw = document.getElementById('spot-photos').value.trim();
  const photos = photosRaw ? photosRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];

  const frame = document.getElementById('spot-input-frame').value;
  const rawLat = parseFloat(document.getElementById('spot-lat').value);
  const rawLng = parseFloat(document.getElementById('spot-lng').value);
  if (!Number.isFinite(rawLat) || !Number.isFinite(rawLng)) {
    toast('error', '请填写有效经纬度');
    return;
  }
  const wgs = normalizeToWgs84(rawLat, rawLng, frame);

  const rich = document.getElementById('spot-rich').value.trim() || null;

  const patch = {
    name,
    subtitle: document.getElementById('spot-subtitle').value.trim() || null,
    short_desc: document.getElementById('spot-short-desc').value.trim() || null,
    rich_content: rich,
    detail: rich,
    lat: wgs.lat,
    lng: wgs.lng,
    estimated_stay_min: (() => {
      const v = parseInt(document.getElementById('spot-stay').value, 10);
      return Number.isFinite(v) ? v : null;
    })(),
    geofence_radius_m: (() => {
      const v = parseInt(document.getElementById('spot-geofence').value, 10);
      return Number.isFinite(v) ? v : 30;
    })(),
    sort_order: (() => {
      const v = parseInt(document.getElementById('spot-sort').value, 10);
      return Number.isFinite(v) ? v : 1;
    })(),
    thumb: document.getElementById('spot-thumb').value.trim() || null,
    photos,
    tags: _spotTags,
    spot_type: document.getElementById('spot-type').value,
    is_visible: document.getElementById('spot-visible').checked,
    is_easter_egg: document.getElementById('spot-easter').checked,
  };

  try {
    await adminApi.updateSpot(id, patch);
    document.getElementById('spot-lat').value = wgs.lat;
    document.getElementById('spot-lng').value = wgs.lng;
    document.getElementById('spot-input-frame').value = 'WGS84';
    document.getElementById('spot-draft-status').textContent = `已保存 ${new Date().toLocaleTimeString()}`;
    toast('success', '游玩点已保存');

    const routeId = document.getElementById('spot-edit-route-id').value;
    if (routeId) {
      try {
        await adminApi.recomputeRouteDerived(routeId);
      } catch (_) { /* ignore */ }
    }

    const routeId2 = document.getElementById('spot-edit-route-id').value;
    if (routeId2 && _spotsCache[routeId2]) {
      delete _spotsCache[routeId2];
      await toggleSpots(routeId2);
      await toggleSpots(routeId2);
    }
  } catch (err) {
    toast('error', `保存失败：${err.message}`);
  }
}

  const photos = document.getElementById('spot-photos').value.trim().split('\n').filter(Boolean);

  preview.innerHTML = photos.slice(0, 5).map(url =>

/* ============================================================

   ============================================================ */
/** @param {'route'|'spot'} mode */
function bindTagInput(inputId, containerId, previewId, mode) {
  const input = document.getElementById(inputId);
  const container = document.getElementById(containerId);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = input.value.trim().replace(/,$/, '');
      const tags = mode === 'route' ? _routeTags : _spotTags;
      if (val && !tags.includes(val)) {
        if (mode === 'route') {
          _routeTags.push(val);
          renderRouteTags();
          _routeModalDirty = true;
          scheduleRouteDraftSave(500);
        } else {
          _spotTags.push(val);
          renderSpotTags();
        }
      }
      input.value = '';
    } else if (e.key === 'Backspace' && !input.value) {
      if (mode === 'route' && _routeTags.length > 0) {
        _routeTags.pop();
        renderRouteTags();
        _routeModalDirty = true;
        scheduleRouteDraftSave(500);
      } else if (mode === 'spot' && _spotTags.length > 0) {
        _spotTags.pop();
        renderSpotTags();
      }
    }
  });

  container.addEventListener('click', () => input.focus());
}

/* ============================================================
   Modal Helpers
   ============================================================ */
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

/* ============================================================
   Toast
   ============================================================ */
function toast(type, message) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast toast--${type}`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('removing');
    el.addEventListener('animationend', () => el.remove());
  }, 3000);
}

/* ============================================================
   Escape HTML
   ============================================================ */
function escHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ============================================================
   Expose to window for inline onclick handlers
   ============================================================ */
window.toggleSpots = toggleSpots;
window.openEditRoute = openEditRoute;
window.openDeleteRoute = openDeleteRoute;
window.confirmDeleteRoute = confirmDeleteRoute;
window.openEditSpot = openEditSpot;
window.openDeleteSpot = openDeleteSpot;
window.confirmDeleteSpot = confirmDeleteSpot;
window.closeModal = closeModal;
window.goPage = goPage;
window.removeRouteTag = removeRouteTag;
window.removeSpotTag = removeSpotTag;
window.saveRoute = saveRoute;
window.saveSpot = saveSpot;
window.addNewSpot = addNewSpot;
</script>
