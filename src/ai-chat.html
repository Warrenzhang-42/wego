<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AI导游小go · WeGO</title>
  <meta name="description" content="与AI导游小go交流" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="route-detail.css" />
  <link rel="stylesheet" href="ai-chat.css" />
</head>
<body>
  <div id="app" class="ac-app-container rd-route-page">

    <!-- ===== MAP SECTION ===== -->
    <div class="rd-map-wrapper ac-map-wrapper" id="ac-map-wrapper">
      <button class="rd-back-btn" id="ac-back-btn" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button type="button" class="rd-fullscreen-btn" id="ac-fullscreen-btn" aria-label="展开地图">
        <svg class="rd-fs-icon-expand" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M2 7V3H6M14 3H18V7M18 13V17H14M6 17H2V13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="rd-fs-icon-collapse" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M7 3H3V7M13 3H17V7M17 13V17H13M7 17H3V13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <!-- 陪走旅程结束：长按进入收获页（「问问导游」consult=1 不显示） -->
      <button type="button" class="rd-back-btn ac-end-tour-btn" id="ac-end-tour-btn" aria-label="长按结束旅程">
        <svg class="ac-end-hold-ring" viewBox="0 0 36 36" aria-hidden="true">
          <circle class="ac-end-ring-track" cx="18" cy="18" r="15" fill="none" />
          <circle class="ac-end-ring-progress" cx="18" cy="18" r="15" fill="none" />
        </svg>
        <span class="ac-end-tour-label">结束</span>
      </button>

      <!-- Map canvas -->
      <div class="rd-map-canvas">
        <!-- 通用地图容器 (Sprint 6) -->
        <div id="rd-map-container" style="width:100%; height:100%;"></div>
        
        <!-- 引擎切换器 (可选，保持与详情页一致) -->
        <div class="rd-engine-switcher" id="rd-engine-switcher" style="display:none;">
          <button class="rd-engine-btn active" data-provider="amap">高德</button>
          <button class="rd-engine-btn" data-provider="mapbox">Mapbox</button>
          <button class="rd-engine-btn" data-provider="bmap">百度</button>
        </div>

        <!-- 降级显示 -->
        <img class="rd-map-photo-inline rd-map-fallback" src="assets/maps/dashilan-street-overlay.png" alt="" aria-hidden="true" style="display:none;" />
      </div>
    </div>

    <!-- ===== CHAT SECTION ===== -->
    <div class="ac-chat-panel" id="ac-chat-panel">
      <!-- Drag handle -->
      <div class="rd-panel-handle"></div>
      
      <!-- Header -->
      <div class="ac-chat-header">
        <div class="ac-ai-title-wrap">
          <h2 class="ac-ai-name">AI导游-小go</h2>
          <div id="ac-nav-status" class="ac-nav-status"></div>
          <a href="personality.html" class="ac-avatar-icon-btn" id="ac-avatar-icon-btn" aria-label="探索人格">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8.2" r="4.1" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 20C4.6 16.4 7.9 14 12 14C16.1 14 19.4 16.4 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </a>
        </div>
        <div class="ac-header-right">
          <div class="ac-progress-wrap">
            <div class="ac-progress-row">
              <div class="ac-progress-track">
                <div class="ac-progress-fill" style="width:42%;"></div>
              </div>
              <span class="ac-progress-percent">42%</span>
            </div>
          </div>
          <button class="ac-reward-btn" id="ac-reward-btn" aria-label="收获">
            <span class="ac-reward-icon" aria-hidden="true">🎁</span>
            收获
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="ac-chat-messages" id="ac-chat-messages">
        <!-- Injected via JS -->
      </div>

      <!-- Input -->
      <div class="ac-chat-input-area">
        <button class="ac-btn-keyboard" aria-label="键盘输入">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <rect x="2.2" y="4.8" width="19.6" height="14.4" rx="2.4" stroke="currentColor" stroke-width="1.8"/>
            <rect x="4.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="7.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="10.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="13.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="16.8" y="7.6" width="2" height="2" rx="0.5" fill="currentColor"/>
            <rect x="4.8" y="10.6" width="2.3" height="2" rx="0.5" fill="currentColor"/>
            <rect x="8.1" y="10.6" width="2.3" height="2" rx="0.5" fill="currentColor"/>
            <rect x="11.4" y="10.6" width="2.3" height="2" rx="0.5" fill="currentColor"/>
            <rect x="14.7" y="10.6" width="5.1" height="2" rx="0.5" fill="currentColor"/>
            <rect x="4.8" y="13.6" width="11.6" height="2.2" rx="0.7" fill="currentColor"/>
            <rect x="17.2" y="13.6" width="2.6" height="2.2" rx="0.7" fill="currentColor"/>
          </svg>
        </button>
        <button class="ac-btn-voice">按住说话</button>
      </div>
    </div>

  <!-- Infrastructure (Sprint 5) -->
  <script type="module" src="lib/geo-utils.js"></script>
  <script type="module" src="lib/event-bus.js"></script>
  <script type="module" src="lib/api-client.js"></script>
  <script type="module" src="lib/geofence-manager.js"></script>
  <script type="module" src="lib/debug-gps.js"></script>
  
  <!-- App Logic -->
  <script src="lib/chat-client.js"></script>
  <script src="ai-chat.js"></script>

  <!-- Map Integration (Sprint 6) -->
  <script>
    window.__WEGO_MAP_CONFIG__ = {
      provider: 'amap',
      apiKey: '4a12d15f179304ca919becb35e7f6b69',
      securityJsCode: 'da808ff5520aa962794be908a765bbe1',
    };
  </script>
  <script type="module" src="lib/map-adapter.js"></script>

  <script type="module">
    import { geofenceManager } from './lib/geofence-manager.js';
    import { apiClient }       from './lib/api-client.js';

    async function initTour() {
      // Sprint 6: 优先从 localStorage 读取活跃路线 ID
      const activeRouteId = localStorage.getItem('wego_active_route_id') || 'e4e20790-a521-4f0e-947b-1172a1e1b7f1';
      
      console.log(`[ai-chat] 正在初始化旅程，路线 ID: ${activeRouteId}`);
      
      // 初始化地理围栏
      geofenceManager.initWithRoute(activeRouteId);
      
      // 地图同步逻辑将在 ai-chat.js 中通过导出接口或 eventBus 同步处理
      window.__WEGO_ACTIVE_ROUTE_ID__ = activeRouteId;
    }

    initTour();
  </script>
</body>
</html>
