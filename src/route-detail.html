<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>大栅栏杨梅竹斜街非遗体验 · WeGO</title>
  <meta name="description" content="沿杨梅竹斜街从青云阁、兔儿爷到铃木食堂与文创钤印，感受大栅栏片区的非遗与慢游" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="route-detail.css" />
  <style>
    /* ===== WeGO 高德地图自定义标记样式 ===== */
    .wego-map-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .wego-marker-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6C5CE7, #a29bfe);
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(108, 92, 231, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Manrope', sans-serif;
      transition: transform 0.15s ease;
    }

    .wego-map-marker:hover .wego-marker-dot {
      transform: scale(1.15);
    }

    .wego-marker-label {
      margin-top: 4px;
      background: rgba(20, 15, 40, 0.85);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Manrope', sans-serif;
      padding: 2px 6px;
      border-radius: 8px;
      white-space: nowrap;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(4px);
    }

    /* 通用地图容器（需高于 .rd-map-photo-inline 的叠层，否则瓦片可能被盖住） */
    #rd-map-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      min-height: 200px;
      background: #e8e4f0;
    }

    /* 引擎切换器 */
    .rd-engine-switcher {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(20, 15, 40, 0.75);
      backdrop-filter: blur(12px);
      padding: 6px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 100;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .rd-engine-btn {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .rd-engine-btn.active {
      background: #6C5CE7;
      color: #fff;
      box-shadow: 0 2px 10px rgba(108, 92, 231, 0.4);
    }
  </style>
</head>

<body>
  <div id="app" class="rd-route-page">

    <!-- ===== MAP SECTION ===== -->
    <div class="rd-map-wrapper" id="rd-map-wrapper">
      <!-- Back button -->
      <button type="button" class="rd-back-btn" id="rd-back-btn" aria-label="返回"
        onclick="window.location.replace('index.html')">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>

      <!-- Map canvas -->
      <div class="rd-map-canvas">
        <!-- 通用地图容器 (Sprint 1.10) -->
        <div id="rd-map-container"></div>
        
        <!-- 引擎切换器 (Sprint 1.11) -->
        <div class="rd-engine-switcher" id="rd-engine-switcher">
          <button class="rd-engine-btn active" onclick="handleSwitch(this, 'amap')">高德</button>
          <button class="rd-engine-btn" onclick="handleSwitch(this, 'mapbox')">Mapbox</button>
          <button class="rd-engine-btn" onclick="handleSwitch(this, 'bmap')">百度</button>
        </div>

        <!-- 降级显示 -->
        <img class="rd-map-photo-inline rd-map-fallback" src="assets/maps/dashilan-street-overlay.png" alt=""
          aria-hidden="true" style="display:none" />
      </div>

      <script>
        // 给内嵌脚本使用的全局切换函数
        function handleSwitch(btn, provider) {
          const btns = btn.parentNode.querySelectorAll('.rd-engine-btn');
          btns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if (window.switchMapEngine) {
            window.switchMapEngine(provider).catch(err => {
              console.error('切换地图引擎失败:', err);
              // 如果没有 key 等，UI 会降级显示控制台警告
            });
          }
        }
      </script>

      <!-- Fullscreen map / collapse sheet — top right, symmetric to back -->
      <button type="button" class="rd-fullscreen-btn" id="rd-fullscreen-btn" aria-label="展开地图">
        <svg class="rd-fs-icon-expand" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M2 7V3H6M14 3H18V7M18 13V17H14M6 17H2V13" stroke="white" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        <svg class="rd-fs-icon-collapse" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M7 3H3V7M13 3H17V7M17 13V17H13M7 17H3V13" stroke="white" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </div>

    <!-- ===== DETAIL PANEL ===== -->
    <div class="rd-detail-panel" id="rd-detail-panel">

      <!-- Panel drag handle -->
      <div class="rd-panel-handle"></div>

      <!-- Route header info -->
      <div class="rd-header">
        <div class="rd-header-main">
          <h1 class="rd-title">大栅栏杨梅竹斜街非遗体验</h1>
        </div>
        <p class="rd-subtitle">从青云阁胡同咖啡到兔儿爷泥塑、日式小食堂与文创钤印，把「看得见的非遗」和「带得走的记忆」放进同一条斜街里；全程步行约 2.5～3.5 小时，可按店休与排队灵活拆成半日或整日。
        </p>

        <!-- Heat + Tags -->
        <div class="rd-meta-row">
          <div class="route-heat">
            <span class="heat-label">热度</span>
            <div class="heat-dots">
              <span class="heat-dot hot"></span>
              <span class="heat-dot hot"></span>
              <span class="heat-dot hot"></span>
              <span class="heat-dot hot"></span>
              <span class="heat-dot half"></span>
            </div>
            <span class="heat-num">15.6k</span>
          </div>
          <div class="rd-tags-row">
            <span class="tag tag-culture">非遗</span>
            <span class="tag tag-history">胡同</span>
            <span class="tag tag-walking">手作</span>
          </div>
        </div>

        <!-- Stats Summary Row (Aligned with Heat) -->
        <div class="rd-stats-row">
          <div class="rd-stat-badge" title="景点数量">
            <span class="rd-stat-icon">📍</span>
            <div class="rd-stat-info-box">
              <span class="rd-stat-val">5</span>
              <span class="rd-stat-key">景点</span>
            </div>
          </div>
          <div class="rd-stat-badge" title="故事数量">
            <span class="rd-stat-icon">📖</span>
            <div class="rd-stat-info-box">
              <span class="rd-stat-val">2</span>
              <span class="rd-stat-key">故事</span>
            </div>
          </div>
          <div class="rd-stat-badge" title="彩蛋数量">
            <span class="rd-stat-icon">🥚</span>
            <div class="rd-stat-info-box">
              <span class="rd-stat-val">8</span>
              <span class="rd-stat-key">彩蛋</span>
            </div>
          </div>
          <div class="rd-stat-badge" title="知识卡片">
            <span class="rd-stat-icon">💡</span>
            <div class="rd-stat-info-box">
              <span class="rd-stat-val">3</span>
              <span class="rd-stat-key">知识</span>
            </div>
          </div>
          <div class="rd-stat-badge" title="活动数量">
            <span class="rd-stat-icon">🎯</span>
            <div class="rd-stat-info-box">
              <span class="rd-stat-val">2</span>
              <span class="rd-stat-key">活动</span>
            </div>
          </div>
        </div>
      </div>


      <!-- Spot List Title -->
      <div class="rd-section-header">
        <h2 class="rd-section-title"><span class="rd-section-icon">📍</span> 景点列表</h2>
      </div>

      <!-- ===== SPOT LIST ===== -->
      <div class="rd-spot-list" id="rd-spot-list"></div><!-- /.rd-spot-list -->

    </div><!-- /.rd-detail-panel -->

    <!-- Spacer for bottom bar（展开地图时由 CSS 收起，避免占用纵向空间） -->
    <div class="rd-bottom-spacer" aria-hidden="true"></div>

  </div><!-- #app -->

  <!-- ===== BOTTOM ACTION BAR ===== -->
  <div class="rd-bottom-bar" id="rd-bottom-bar">
    <button class="rd-start-btn" id="rd-start-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <polygon points="5,3 15,9 5,15" fill="white" />
      </svg>
      开始旅程
    </button>
    <button class="rd-ai-btn" id="rd-ai-btn">
      问问导游
    </button>
    <button class="rd-fav-btn" id="rd-fav-btn" aria-label="收藏">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
        </path>
      </svg>
    </button>
  </div>

  <!-- ===== FULLSCREEN OVERLAY ===== -->
  <div class="rd-fullscreen-overlay" id="rd-fullscreen-overlay" aria-hidden="true">
    <div class="rd-fs-map-container">
      <!-- reuse same svg in fullscreen via JS clone -->
    </div>
    <button class="rd-fs-close-btn" id="rd-fs-close-btn" aria-label="退出全屏">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M5 5L15 15M15 5L5 15" stroke="white" stroke-width="2.2" stroke-linecap="round" />
      </svg>
    </button>
    <!-- Fullscreen bottom sheet panel -->
    <div class="rd-fs-bottom-sheet" id="rd-fs-bottom-sheet">
      <div class="rd-panel-handle"></div>
      <div class="rd-fs-sheet-content">
        <h2 class="rd-fs-route-name">大栅栏杨梅竹斜街非遗体验</h2>
        <div class="rd-fs-spot-pills" id="rd-fs-spot-pills">
          <button class="rd-fs-pill active" data-spot="0">① 青云阁·模范咖啡</button>
          <button class="rd-fs-pill" data-spot="1">② 兔儿爷传承店</button>
          <button class="rd-fs-pill" data-spot="2">③ 铃木食堂</button>
          <button class="rd-fs-pill" data-spot="3">④ 乾坤空间文创</button>
          <button class="rd-fs-pill" data-spot="4">⑤ 将将堂印章</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase 配置（Sprint 2.7/2.8）— anon key 仅有 SELECT 权限，可安全暴露 -->
  <script>

  <script type="module" src="route-detail.js"></script>
</body>

</html>
