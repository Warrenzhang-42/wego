<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正在跳转 · 路线上传</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 40rem; margin: 0 auto; line-height: 1.6; color: #333; }
    a { color: #b22314; }
  </style>
  <script>
    function adminUploadUrl() {
      if (window.__WEGO_ADMIN_UPLOAD_URL__) return window.__WEGO_ADMIN_UPLOAD_URL__;
      var o = window.__WEGO_ADMIN_ORIGIN__;
      if (o) return String(o).replace(/\/$/, '') + '/admin#route-upload';
      var loc = window.location;
      var port = loc.port;
      if (port === '5173') return loc.protocol + '//' + loc.hostname + ':5174/admin#route-upload';
      return loc.protocol + '//' + loc.hostname + (port ? ':' + port : '') + '/admin#route-upload';
    }
    document.addEventListener('DOMContentLoaded', function () {
      var t = adminUploadUrl();
      var link = document.getElementById('manual-link');
      if (link) link.href = t;
    });
    window.location.replace(adminUploadUrl());
  </script>
</head>
<body>
  <h1>路线上传已迁至后台</h1>
  <p>内容上传与 Agent 解析、补充引导请在 <strong>WeGO 内容管理后台</strong> 的「路线上传」中完成（PC 布局）。</p>
  <p>若未自动跳转，请<a id="manual-link" href="http://127.0.0.1:5174/admin#route-upload">点此打开后台上传页</a>（本地默认后台端口 5174）。</p>
</body>
</html>
